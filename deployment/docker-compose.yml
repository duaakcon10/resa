version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: c2_db
      POSTGRES_USER: c2_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c2_admin -d c2_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build: ../backend
    restart: unless-stopped
    volumes:
      - ../frontend/dist:/frontend/dist:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://c2_admin:${DB_PASSWORD:-changeme}@postgres:5432/c2_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-this}
      C2_HOST: 0.0.0.0
      C2_PORT: 443
      C2_DOMAIN: ${C2_DOMAIN:-api.your-domain.com}
      DASHBOARD_URL: ${DASHBOARD_URL:-https://your-domain.com}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MB_USERNAME: ${MB_USERNAME:-}
      MB_PASSWORD: ${MB_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "80:443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
