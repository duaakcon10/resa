services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: c2_db
      POSTGRES_USER: c2_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c2_admin -d c2_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mbbank:
    build: ../mbbank-service
    restart: unless-stopped
    environment:
      MBBANK_USERNAME: ${MB_USERNAME:-}
      MBBANK_PASSWORD: ${MB_PASSWORD:-}
      MBBANK_ACCOUNT_NUMBER: ${MB_ACCOUNT_NUMBER:-}
      MBBANK_ACCOUNT_NAME: ${MB_ACCOUNT_NAME:-}
      API_KEY: ${MB_SERVICE_API_KEY:-c2-mb-internal-key}
      PORT: 3000
      HOST: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    build: ../backend
    restart: unless-stopped
    volumes:
      - ../frontend/dist:/frontend/dist:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://c2_admin:${DB_PASSWORD:-changeme}@postgres:5432/c2_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-this}
      C2_HOST: 0.0.0.0
      C2_PORT: 8000
      C2_DOMAIN: ${C2_DOMAIN:-bot.minhvuong.io.vn}
      DASHBOARD_URL: ${DASHBOARD_URL:-https://bot.minhvuong.io.vn}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MB_USERNAME: ${MB_USERNAME:-}
      MB_PASSWORD: ${MB_PASSWORD:-}
      MB_ACCOUNT_NUMBER: ${MB_ACCOUNT_NUMBER:-}
      MB_ACCOUNT_NAME: ${MB_ACCOUNT_NAME:-}
      MB_SERVICE_URL: http://mbbank:3000
      MB_SERVICE_API_KEY: ${MB_SERVICE_API_KEY:-c2-mb-internal-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    # Cloudflare terminates TLS; Caddy serves HTTP:80 → api:8000


volumes:
  pgdata:
  caddy_data:
  caddy_config:
